# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Only github-actions is monitored. Python dependencies are mostly tied to the
# pinned Home Assistant version and must be updated manually in lockstep.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
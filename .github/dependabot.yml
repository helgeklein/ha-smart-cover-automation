version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:30'
      timezone: UTC
    open-pull-requests-limit: 3
    groups:
      github-actions-version-updates:
        applies-to: version-updates
        patterns:
          - '*'
      github-actions-security-updates:
        applies-to: security-updates
        patterns:
          - '*'
    commit-message:
      prefix: ci(deps)
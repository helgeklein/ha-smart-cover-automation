name: Dependency Review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Review dependencies
        id: dependency_review
        continue-on-error: true
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate
          retry-on-snapshot-warnings: true
          retry-on-snapshot-warnings-timeout: 300
          show-patched-versions: true

      - name: Warn when GitHub dependency snapshots are unavailable
        if: steps.dependency_review.outcome == 'failure'
        run: |
          echo "::warning::GitHub dependency snapshots were unavailable for this PR head SHA. Falling back to direct Python and Ruby dependency audits of the committed lockfiles."

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        if: steps.dependency_review.outcome == 'failure'
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: requirements-lock.txt

      - name: Audit pinned Python dependencies
        if: steps.dependency_review.outcome == 'failure'
        run: |
          python -m pip install pip-audit
          python -m pip_audit -r requirements-lock.txt --progress-spinner off \
            --ignore-vuln CVE-2025-69223 \
            --ignore-vuln CVE-2025-69224 \
            --ignore-vuln CVE-2025-69225 \
            --ignore-vuln CVE-2025-69226 \
            --ignore-vuln CVE-2025-69227 \
            --ignore-vuln CVE-2025-69228 \
            --ignore-vuln CVE-2025-69229 \
            --ignore-vuln CVE-2025-69230 \
            --ignore-vuln CVE-2025-67221 \
            --ignore-vuln CVE-2025-62172 \
            --ignore-vuln CVE-2026-26007 \
            --ignore-vuln CVE-2026-33044 \
            --ignore-vuln CVE-2026-33045 \
            --ignore-vuln CVE-2026-34073 \
            --ignore-vuln CVE-2026-25990 \
            --ignore-vuln CVE-2026-32597 \
            --ignore-vuln CVE-2026-27448 \
            --ignore-vuln CVE-2026-27459 \
            --ignore-vuln CVE-2026-25645 \
            --ignore-vuln GHSA-w476-p2h3-79g9 \
            --ignore-vuln CVE-2025-13327

      - name: Set up Ruby
        if: steps.dependency_review.outcome == 'failure'
        uses: ruby/setup-ruby@e5517072e87f198d9533967ae13d97c11b604005 # v1.99.0
        with:
          ruby-version: '3.1.1'
          bundler: none
          working-directory: '${{ github.workspace }}/docs'

      - name: Audit pinned Ruby dependencies
        if: steps.dependency_review.outcome == 'failure'
        working-directory: ./docs
        run: |
          gem install bundler-audit --no-document
          bundle-audit check --update
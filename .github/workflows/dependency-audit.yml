name: Dependency Audit

on:
  schedule:
    - cron: '17 5 * * 2'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: requirements-lock.txt

      - name: Audit pinned Python dependencies
        run: |
          python -m pip install pip-audit
          python -m pip_audit -r requirements-lock.txt --require-hashes --progress-spinner off \
            --ignore-vuln CVE-2025-69223 \
            --ignore-vuln CVE-2025-69224 \
            --ignore-vuln CVE-2025-69225 \
            --ignore-vuln CVE-2025-69226 \
            --ignore-vuln CVE-2025-69227 \
            --ignore-vuln CVE-2025-69228 \
            --ignore-vuln CVE-2025-69229 \
            --ignore-vuln CVE-2025-69230 \
            --ignore-vuln CVE-2025-67221 \
            --ignore-vuln CVE-2025-62172 \
            --ignore-vuln CVE-2026-26007 \
            --ignore-vuln CVE-2026-33044 \
            --ignore-vuln CVE-2026-33045 \
            --ignore-vuln CVE-2026-34073 \
            --ignore-vuln CVE-2026-25990 \
            --ignore-vuln CVE-2026-32597 \
            --ignore-vuln CVE-2026-27448 \
            --ignore-vuln CVE-2026-27459 \
            --ignore-vuln CVE-2026-25645 \
            --ignore-vuln GHSA-w476-p2h3-79g9 \
            --ignore-vuln CVE-2025-13327

  ruby-audit:
    name: Ruby Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64 # v1.299.0
        with:
          ruby-version: '3.1.1'
          bundler: none
          working-directory: '${{ github.workspace }}/docs'

      - name: Audit pinned Ruby dependencies
        working-directory: ./docs
        run: |
          gem install bundler-audit --no-document
          bundle-audit check --update
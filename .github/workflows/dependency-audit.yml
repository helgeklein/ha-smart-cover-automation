name: Dependency Audit

on:
  schedule:
    - cron: '17 5 * * 2'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: |
            requirements-lock.txt
            requirements-test-lock.txt

      - name: Audit pinned Python dependencies
        run: |
          python -m pip install pip-audit
          # Home Assistant 2026.4.1 pins cryptography 46.0.5 and PyJWT 2.10.1.
          python -m pip_audit -r requirements-lock.txt --require-hashes --progress-spinner off \
            --ignore-vuln CVE-2026-34073 \
            --ignore-vuln CVE-2026-32597
          python -m pip_audit -r requirements-test-lock.txt --require-hashes --progress-spinner off \
            --ignore-vuln CVE-2026-34073 \
            --ignore-vuln CVE-2026-32597

  ruby-audit:
    name: Ruby Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64 # v1.299.0
        with:
          ruby-version: '3.3.4'
          bundler: none
          working-directory: '${{ github.workspace }}/docs'

      - name: Audit pinned Ruby dependencies
        working-directory: ./docs
        run: |
          gem install bundler-audit --no-document
          bundle-audit check --update